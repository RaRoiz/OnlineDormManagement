<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>
      ข้อมูลผู้เช่า | Dorm Management
    </title>
  </head>

  <body>
    <header class="page-header">
      <a class="back-link" href="/index.html">
        ← กลับหน้า Home
      </a>

      <h1>จัดการผู้เช่า</h1>

      <button
        id="logout-button"
        class="logout-button"
        type="button"
      >
        ออกจากระบบ
      </button>
    </header>

    <main class="tenant-page">
      <section class="page-title">
        <div>
          <p class="eyebrow">
            TENANT MANAGEMENT
          </p>

          <h2>ข้อมูลผู้เช่า</h2>

          <p>
            จัดการข้อมูลผู้เช่าและการเข้าพัก
          </p>
        </div>

        <button
          id="open-form-button"
          class="primary-button"
          type="button"
        >
          + เพิ่มผู้เช่า
        </button>
      </section>

      <section
        id="tenant-form-panel"
        class="form-panel"
        hidden
      >
        <div class="form-panel-header">
          <h3 id="form-title">
            เพิ่มผู้เช่า
          </h3>

          <button
            id="close-form-button"
            class="icon-button"
            type="button"
            aria-label="ปิดแบบฟอร์ม"
          >
            ×
          </button>
        </div>

        <form id="tenant-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="full-name">
                ชื่อ-นามสกุล
              </label>

              <input
                id="full-name"
                name="fullName"
                type="text"
                placeholder="ชื่อและนามสกุล"
                required
              />
            </div>

            <div class="form-group">
              <label for="citizen-id">
                เลขบัตรประชาชน / Passport
              </label>

              <input
                id="citizen-id"
                name="citizenId"
                type="text"
                placeholder="เลขประจำตัวผู้เช่า"
                required
              />
            </div>

            <div class="form-group">
  <label for="phone">เบอร์โทรศัพท์</label>
  <input
    id="phone"
    name="phone"
    type="tel"
    inputmode="numeric"
    maxlength="10"
    placeholder="เช่น 0812345678"
    required
  />
</div>

<div class="form-group">
  <label for="line-id">Line ID</label>
  <input
    id="line-id"
    name="lineId"
    type="text"
    placeholder="เช่น somchai.line"
  />
</div>

<div class="form-group">
  <label for="email">E-mail</label>
  <input
    id="email"
    name="email"
    type="email"
    placeholder="เช่น user@email.com"
  />
</div>

<div class="form-group">
  <label for="tenant-room">ห้องพัก</label>
  <select
    id="tenant-room"
    name="roomId"
    required
  >
    <option value="">เลือกห้องพัก</option>
  </select>
</div>

<div class="form-group">
  <label for="check-in-date">วันที่และเวลาเข้าพัก</label>
  <input
    id="check-in-date"
    name="checkInDate"
    type="datetime-local"
    required
  />
</div>
          </div>

          <div
            id="form-message"
            class="form-message"
            role="alert"
          ></div>

          <div class="form-actions">
            <button
              id="cancel-button"
              class="secondary-button"
              type="button"
            >
              ยกเลิก
            </button>

            <button
              id="save-button"
              class="primary-button"
              type="submit"
            >
              บันทึก
            </button>
          </div>
        </form>
      </section>

      <section class="toolbar">
        <input
          id="search-input"
          type="search"
          placeholder="ค้นหาชื่อ เลขบัตร ห้อง หรือเบอร์โทร..."
        />

        <select id="status-filter">
          <option value="">
            ทุกสถานะ
          </option>

          <option value="ACTIVE">
            กำลังพัก
          </option>

          <option value="INACTIVE">
            ย้ายออกแล้ว
          </option>
        </select>
      </section>

      <section class="table-card">
        <div
          id="page-message"
          class="page-message"
          role="alert"
        ></div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
    <th>ชื่อผู้เช่า</th>
    <th>เลขประจำตัว</th>
    <th>เบอร์โทร</th>
    <th>Line</th>
    <th>E-mail</th>
    <th>ห้อง</th>
    <th>วันที่เข้าพัก</th>
    <th>วันที่ย้ายออก</th>
    <th>สถานะ</th>
    <th class="action-column">จัดการ</th>
  </tr>
            </thead>

            <tbody id="tenant-table-body">
              <tr>
                <td
                  class="loading-cell"
                  colspan="10"
                >
                  กำลังโหลดข้อมูล...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="/src/pages/Tenant/tenant.ts"
    ></script>
  </body>
</html>
