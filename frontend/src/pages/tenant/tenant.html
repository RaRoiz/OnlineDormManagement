<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="description"
      content="หน้าจัดการข้อมูลผู้เช่าระบบจัดการหอพัก"
    />

    <title>ข้อมูลผู้เช่า | Dorm Management</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dorm_theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia(
              "(prefers-color-scheme: dark)"
            ).matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <header class="page-header">
      <a
        class="back-link"
        href="/index.html"
      >
        ← กลับหน้า Home
      </a>

      <h1>จัดการผู้เช่า</h1>

      <button
        id="logout-button"
        class="logout-button"
        type="button"
      >
        ออกจากระบบ
      </button>
    </header>

    <main class="tenant-page">
      <section class="page-title">
        <div>
          <p class="eyebrow">
            TENANT MANAGEMENT
          </p>

          <h2>ข้อมูลผู้เช่า</h2>

          <p>
            จัดการข้อมูลผู้เช่าและการเข้าพัก
          </p>
        </div>

        <button
          id="open-form-button"
          class="primary-button"
          type="button"
        >
          + เพิ่มผู้เช่า
        </button>
      </section>

      <!-- แบบฟอร์มเพิ่มและแก้ไขผู้เช่า -->
      <section
        id="tenant-form-panel"
        class="form-panel"
        hidden
      >
        <div class="form-panel-header">
          <h3 id="form-title">
            เพิ่มผู้เช่า
          </h3>

          <button
            id="close-form-button"
            class="icon-button"
            type="button"
            aria-label="ปิดแบบฟอร์ม"
          >
            ×
          </button>
        </div>

        <form
          id="tenant-form"
          novalidate
        >
          <div class="form-grid">
            <!-- ชื่อผู้เช่า -->
            <div class="form-group">
              <label for="full-name">
                ชื่อ-นามสกุล
              </label>

              <input
                id="full-name"
                name="fullName"
                type="text"
                autocomplete="name"
                placeholder="กรอกชื่อและนามสกุล"
                required
              />
            </div>

            <!-- เลขประจำตัว -->
            <div class="form-group">
              <label for="citizen-id">
                เลขบัตรประชาชน / Passport
              </label>

              <input
                id="citizen-id"
                name="citizenId"
                type="text"
                autocomplete="off"
                placeholder="กรอกเลขประจำตัวผู้เช่า"
                required
              />
            </div>

            <!-- เบอร์โทรศัพท์ -->
            <div class="form-group">
              <label for="phone">
                เบอร์โทรศัพท์
              </label>

              <input
                id="phone"
                name="phone"
                type="tel"
                inputmode="numeric"
                autocomplete="tel"
                minlength="10"
                maxlength="10"
                pattern="[0-9]{10}"
                placeholder="เช่น 0812345678"
                title="กรุณากรอกตัวเลข 10 หลัก"
                required
              />

              <small class="field-hint">
                กรอกตัวเลขจำนวน 10 หลัก
              </small>
            </div>

            <!-- Line ID -->
            <div class="form-group">
              <label for="line-id">
                Line ID
              </label>

              <input
                id="line-id"
                name="lineId"
                type="text"
                autocomplete="off"
                placeholder="เช่น @somchai.line"
              />
            </div>

            <!-- E-mail -->
            <div class="form-group">
              <label for="email">
                E-mail
              </label>

              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="เช่น user@email.com"
              />
            </div>

            <!-- ห้องพัก -->
            <div class="form-group">
              <label for="tenant-room">
                ห้องพัก
              </label>

              <select
                id="tenant-room"
                name="roomId"
                required
              >
                <option value="">
                  เลือกห้องพัก
                </option>
              </select>

              <small class="field-hint">
                แสดงเฉพาะห้องว่าง
              </small>
            </div>

            <!-- วันที่และเวลาเข้าพัก -->
            <div class="form-group">
              <label for="check-in-date">
                วันที่และเวลาเข้าพัก
              </label>

              <input
                id="check-in-date"
                name="checkInDate"
                type="datetime-local"
                required
              />
            </div>
          </div>

          <div
            id="form-message"
            class="form-message"
            role="alert"
            aria-live="polite"
          ></div>

          <div class="form-actions">
            <button
              id="cancel-button"
              class="secondary-button"
              type="button"
            >
              ยกเลิก
            </button>

            <button
              id="save-button"
              class="primary-button"
              type="submit"
            >
              บันทึก
            </button>
          </div>
        </form>
      </section>

      <!-- ค้นหาและกรองสถานะ -->
      <section
        class="toolbar"
        aria-label="ค้นหาและกรองข้อมูลผู้เช่า"
      >
        <div class="filter-group">
          <label for="search-input">ค้นหา</label>

          <input
            id="search-input"
            type="search"
            placeholder="ค้นหาชื่อ เลขบัตร เบอร์โทร Line E-mail หรือห้อง..."
          />
        </div>

        <div class="filter-group">
          <label for="room-filter">ห้องพัก</label>

          <select id="room-filter">
            <option value="">ทุกห้อง</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="status-filter">สถานะ</label>

          <select id="status-filter">
            <option value="">
              ทุกสถานะ
            </option>

            <option value="ACTIVE">
              กำลังพัก
            </option>

            <option value="INACTIVE">
              ย้ายออกแล้ว
            </option>
          </select>
        </div>
      </section>

      <!-- ตารางข้อมูลผู้เช่า -->
      <section class="table-card">
        <div
          id="page-message"
          class="page-message"
          role="alert"
          aria-live="polite"
        ></div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ชื่อผู้เช่า</th>
                <th>เลขประจำตัว</th>
                <th>เบอร์โทร</th>
                <th>Line ID</th>
                <th>E-mail</th>
                <th>ห้อง</th>
                <th>วันที่และเวลาเข้าพัก</th>
                <th>วันที่และเวลาย้ายออก</th>
                <th>สถานะ</th>

                <th class="action-column">
                  จัดการ
                </th>
              </tr>
            </thead>

            <tbody id="tenant-table-body">
              <tr>
                <td
                  class="loading-cell"
                  colspan="10"
                >
                  กำลังโหลดข้อมูลผู้เช่า...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="/src/pages/tenant/tenant.ts"
    ></script>
  </body>
</html>
